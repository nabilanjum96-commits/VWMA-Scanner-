name: Daily Forecast

on:
  # Disabled — forecast runs locally
  # schedule:
  #   - cron: '0 1 * * *'
  workflow_dispatch: # Manual trigger only (for testing)

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules between runs
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ hashFiles('package-lock.json', 'package.json') }}

      - name: Install dependencies
        run: npm install --production

      # Restore forecast cache from previous run
      - name: Restore forecast cache
        uses: actions/cache@v4
        with:
          path: forecast-cache.json
          key: forecast-${{ github.run_id }}
          restore-keys: forecast-

      - name: Run daily forecast
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node forecast-job.js
